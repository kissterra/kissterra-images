name: CI


on:
  workflow_dispatch:
  #push:
  #  branches: [master]
  #pull_request:
  #  branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          echo "Add your test command here"
          # Examples:
          # npm test
          # pytest
          # dotnet test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/kissterra-images:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/kissterra-images:latest .
          docker push $ECR_REGISTRY/kissterra-images:$IMAGE_TAG
          docker push $ECR_REGISTRY/kissterra-images:latest
